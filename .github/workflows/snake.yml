name: Generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: X1-YAM2000
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=111827&color_dots=#ebedf0,#c9d1d9,#8b949e,#6e7681,#484f58
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=ffffff

      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

