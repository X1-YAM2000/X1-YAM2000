name: Generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: X1-YAM2000
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23111827&color_dots=%23f6f8fa,%23d0d7de,%238c959f,%2357606a,%2324292f
            dist/github-contribution-grid-snake-dark.svg?color_snake=%23ffffff&color_dots=%231616b,%2330303d,%23484854,%23666672,%23a0a0aa
            
      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

