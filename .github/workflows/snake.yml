name: Generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: X1-YAM2000
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23000000&color_dots=%23f3f4f6,%23d1d5db,%239ca3af,%234b5563,%23000000
            dist/github-contribution-grid-snake-dark.svg?color_snake=%23ffffff&color_dots=%2327272a,%233f3f46,%2352525b,%2371717a,%23ffffff

            
      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

